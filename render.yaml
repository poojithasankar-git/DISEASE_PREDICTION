services:
  - type: web
    name: banana-leaf-api
    runtime: python
    runtimeVersion: 3.11
    buildCommand: pip install -r requirements.txt && python train.py
    startCommand: gunicorn --workers 1 --timeout 120 --bind 0.0.0.0:$PORT app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: KAGGLE_API_TOKEN
        scope: build
